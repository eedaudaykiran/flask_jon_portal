{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Create an Account</h3>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('signup') }}">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                        <div class="form-text">Minimum 8 characters, with uppercase, lowercase, digit, and special
                            character.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">I am a</label>
                        <select name="role" class="form-select" id="roleSelect" required>
                            <option value="candidate">Candidate</option>
                            <option value="recruiter">Recruiter</option>
                        </select>
                    </div>
                    <!-- Candidate Fields -->
                    <div id="candidateFields">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="full_name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="tel" name="phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Skills (comma separated)</label>
                            <textarea name="skills" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                    <!-- Recruiter Fields -->
                    <div id="recruiterFields" style="display: none;">
                        <div class="mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company_name" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Company Description</label>
                            <textarea name="company_description" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
                </form>
                <div class="mt-3 text-center">
                    Already have an account? <a href="{{ url_for('login') }}">Login</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const roleSelect = document.getElementById('roleSelect');
    const candidateFields = document.getElementById('candidateFields');
    const recruiterFields = document.getElementById('recruiterFields');

    roleSelect.addEventListener('change', function () {
        if (this.value === 'candidate') {
            candidateFields.style.display = 'block';
            recruiterFields.style.display = 'none';
            // Make candidate fields required
            document.querySelector('input[name="full_name"]').required = true;
            document.querySelector('input[name="company_name"]').required = false;
        } else {
            candidateFields.style.display = 'none';
            recruiterFields.style.display = 'block';
            document.querySelector('input[name="full_name"]').required = false;
            document.querySelector('input[name="company_name"]').required = true;
        }
    });
    // Trigger on load
    roleSelect.dispatchEvent(new Event('change'));
</script>
{% endblock %}
